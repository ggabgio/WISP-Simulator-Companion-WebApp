<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View User</title>

  <!-- Bootstrap -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css"
  />

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  />

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="../assets/view-user.css">
</head>

<body>
  <!-- Hamburger (for mobile) -->
  <button class="hamburger" onclick="document.querySelector('.sidebar').classList.toggle('active')">
    ☰
  </button>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">
      <img src="../assets/logo2.png" alt="Dela Cruz Network Solutions">
      <span class="company-name">Dela Cruz Network Solutions</span>
    </div>
    <ul>
      <li><a href="admin-dashboard.html" class="nav-link"><i class="fas fa-home"></i> Dashboard</a></li>
      <li><a href="view-score.html" class="nav-link"><i class="fas fa-chart-line"></i> Score History</a></li>
      <li><a href="edit-users.html" class="nav-link"><i class="fas fa-users-cog"></i> User Management</a></li>
      <li><a href="../index.html" id="logoutBtn" class="nav-link"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
    </ul>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <div class="container-fluid content-split">

      <!-- Top Half -->
      <div class="top-half">
        <!-- User Details Card -->
        <div class="card shadow-sm p-3 mb-3">
          <h5 class="mb-3"><i class="fas fa-user"></i> User Details</h5>
          <div class="row">
            <div class="col-md-6">
              <p><strong>Name:</strong> <span id="userName">Loading...</span></p>
              <p><strong>Email:</strong> <span id="userEmail">Loading...</span></p>
            </div>
            <div class="col-md-6">
              <p><strong>Role:</strong> <span id="userRole">Loading...</span></p>
            </div>
          </div>
        </div>

        <!-- Graphs -->
        <div class="card shadow-sm p-3">
          <div class="charts-container">
            <div class="chart-wrapper">
              <canvas id="userRadarChart"></canvas>
            </div>
            <div class="chart-wrapper">
              <canvas id="userBarChart"></canvas>
            </div>
          </div>
        </div>
      </div>

      <!-- Bottom Half: Scores -->
      <div class="bottom-half">
        <div class="card shadow-sm">
          <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0"><i class="fas fa-chart-line"></i> Scores</h5>
            <button id="userDashboardPrintBtn" class="btn btn-sm btn-light">
              <i class="fas fa-print"></i> Print
            </button>
          </div>
          <div class="card-body">
            <!-- Category Selector -->
            <div class="mb-3">
              <label for="userDashboardActivityFilter" class="form-label">Select Category:</label>
              <select id="userDashboardActivityFilter" class="form-select" style="max-width: 250px;">
                <option value="Quiz">Quiz</option>
                <option value="Training">Training</option>
                <option value="Assessment">Assessment</option>
                <option value="Maintenance">Maintenance</option>
              </select>
            </div>

            <div class="table-responsive">
              <table class="table table-striped table-hover">
                <thead class="table-dark">
                  <tr>
                    <th>Category</th>
                    <th>Level / Activity</th>
                    <th>Status</th>
                    <th>Date</th>
                  </tr>
                </thead>
                <tbody id="userDashboardActivitiesTable">
                  <tr><td colspan="4" class="text-center text-muted">Loading...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <footer class="footer">
        <p>&copy; 2025 Training Simulator. All rights reserved.</p>
      </footer>
    </div>
  </div>

  <!-- Sidebar highlight -->
  <script>
    const links = document.querySelectorAll('.sidebar .nav-link');
    const currentPage = window.location.pathname.split('/').pop();
    links.forEach(link => {
      if (link.getAttribute('href') === currentPage) {
        link.classList.add('active');
      }
    });
  </script>

  <!-- Chart.js + Logic -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script type="module" src="../js/view-user.js"></script>
</body>
</html>
